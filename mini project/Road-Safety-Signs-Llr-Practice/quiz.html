<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Road Safety Quiz</title>

  <!-- Tailwind + animate.css -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

  <style>
    .option-btn { transition: all 0.2s ease; }
    .option-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
  </style>

  <!-- Supabase JS v2 -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen p-4 md:p-8">

<div id="app" class="max-w-4xl mx-auto">

  <!-- Welcome Screen -->
  <div id="welcome-screen" class="bg-white rounded-2xl shadow-xl p-8 text-center animate__animated animate__fadeIn">
    <h1 class="text-3xl md:text-4xl font-bold text-gray-800 mb-6">🚦 Road Safety Quiz</h1>
    <p class="text-gray-600 mb-8">Test your knowledge of road safety rules and traffic signs.</p>

    <button id="start-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-full transition duration-300 transform hover:scale-105" aria-label="Start the quiz">
      Start Quiz
    </button>
  </div>

  <!-- Quiz Container -->
  <div id="quiz-container" class="hidden animate__animated animate__fadeInUp">
    <div class="bg-white rounded-xl shadow-md p-3 mb-6 flex flex-wrap gap-3 justify-between items-center">
      <div>Question <span id="current-question">1</span> / <span id="total-questions">0</span></div>
      <div>Score: <span id="live-score">0</span></div>
      <div>⏰ <span id="time-left">30</span>s</div>
    </div>

    <div id="media-wrap" class="mb-4 hidden">
      <img id="question-image" loading="lazy" class="w-full max-h-64 object-contain rounded-xl border border-gray-200 bg-white" alt="Question image"/>
    </div>

    <div id="question-text" class="bg-blue-50 p-4 mb-4 font-semibold rounded-xl border border-blue-100" role="region" aria-live="polite"></div>
    <div id="options-container" class="grid gap-3"></div>
  </div>

  <!-- Results Screen -->
  <div id="results-screen" class="hidden text-center animate__animated animate__fadeInUp">
    <h2 id="result-title" class="text-3xl font-bold mb-4"></h2>
    <p class="mb-2">Score: <span id="score">0</span> / <span id="total-score">0</span></p>
    <p class="mb-6">Percentage: <span id="percentage">0</span>%</p>
    
    <!-- Action Buttons -->
    <div class="flex gap-4 justify-center">
      <button id="restart-btn" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-full font-semibold transition transform hover:scale-105">
        🔄 Restart Test
      </button>
      <button onclick="location.reload()" class="bg-green-500 hover:bg-green-600 text-white px-6 py-3 rounded-full font-semibold transition transform hover:scale-105">
        🏠 Home
      </button>
    </div>
  </div>

</div>

<script>
/* ====== SUPABASE CONFIG ====== */
const SUPABASE_URL = "https://ittpqmsjywssnffqoonv.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Iml0dHBxbXNqeXdzc25mZnFvb252Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTAwNzY3NjksImV4cCI6MjA2NTY1Mjc2OX0.UdnbCkWY2j3JcPSZhEuLJz0-eXX1HQ_daZmTI62zRFU";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ====== STATE ====== */
let questions = [];
let currentQuestionIndex = 0;
let score = 0;
let timer = null;

/* ====== ELEMENTS ====== */
const welcomeScreen = document.getElementById("welcome-screen");
const quizContainer = document.getElementById("quiz-container");
const resultsScreen = document.getElementById("results-screen");

const qTextEl = document.getElementById("question-text");
const optsEl = document.getElementById("options-container");
const imgWrap = document.getElementById("media-wrap");
const imgEl = document.getElementById("question-image");

const currentQEl = document.getElementById("current-question");
const totalQEl = document.getElementById("total-questions");
const timeLeftEl = document.getElementById("time-left");
const liveScoreEl = document.getElementById("live-score");

const finalScoreEl = document.getElementById("score");
const totalScoreEl = document.getElementById("total-score");
const percentageEl = document.getElementById("percentage");

/* ====== HELPERS ====== */
function safeJsonParse(val) {
  if (Array.isArray(val)) return val;
  if (val == null) return [];
  if (typeof val === "object") return Object.values(val);
  try {
    const parsed = JSON.parse(val);
    return Array.isArray(parsed) ? parsed : Object.values(parsed);
  } catch {
    return String(val).split(/\s*\|\s*|\s*,\s*/).filter(Boolean);
  }
}

function shuffle(array) {
  return array.map(a => [Math.random(), a]).sort((a,b)=>a[0]-b[0]).map(a=>a[1]);
}

function normalize(text) {
  return String(text || "")
    .replace(/^[A-D]\s*[\.\)]\s*/i, "")
    .trim()
    .toLowerCase();
}

function getCorrectText(row, opts) {
  if (row.answers && String(row.answers).trim()) return row.answers;
  const ca = row.correct_answer;
  if (!isNaN(ca)) {
    const n = Number(ca);
    if (n > 0 && n <= opts.length) return opts[n - 1];
    if (n >= 0 && n < opts.length) return opts[n];
  }
  return String(ca);
}

/* Use given URL directly if signed or full */
function buildImageUrl(u) {
  if (!u) return "";
  let s = String(u).trim();
  if (/^https?:\/\//i.test(s)) return s;
  return `${SUPABASE_URL}/storage/v1/object/public/signs/${s.replace(/^\//, "")}`;
}

function showImageIfAvailable(rawUrl) {
  const finalUrl = buildImageUrl(rawUrl);
  if (!finalUrl) {
    imgWrap.classList.add("hidden");
    imgEl.src = "";
    return;
  }
  const probe = new Image();
  probe.onload = () => {
    imgEl.src = finalUrl;
    imgWrap.classList.remove("hidden");
  };
  probe.onerror = () => {
    imgWrap.classList.add("hidden");
    imgEl.src = "";
  };
  probe.src = finalUrl;
}

/* ====== START QUIZ ====== */
document.getElementById("start-btn").addEventListener("click", startQuiz);

async function startQuiz() {
  welcomeScreen.classList.add("hidden");
  quizContainer.classList.remove("hidden");

  const { data, error } = await supabaseClient.from("quiz_questions").select("*");
  if (error) {
    console.error("Supabase error:", error.message);
    alert("Error loading questions. Check console for details.");
    return;
  }
  if (!data || data.length === 0) {
    alert("No questions found in database.");
    return;
  }

  questions = shuffle(
    data.map(row => {
      const opts = safeJsonParse(row.options) || [];
      return {
        id: row.id,
        question: row.question,
        options: shuffle([...opts]),
        correctText: getCorrectText(row, opts),
        image_url: row.image_url || ""
      };
    })
  ).slice(0, 20);

  totalQEl.textContent = questions.length;
  score = 0;
  liveScoreEl.textContent = score;
  currentQuestionIndex = 0;
  showQuestion();
}

/* ====== SHOW QUESTION ====== */
function showQuestion() {
  clearInterval(timer);
  if (currentQuestionIndex >= questions.length) return showResults();

  const q = questions[currentQuestionIndex];
  currentQEl.textContent = currentQuestionIndex + 1;
  qTextEl.textContent = q.question;

  if (q.image_url && String(q.image_url).trim() !== "") {
    showImageIfAvailable(q.image_url);
  } else {
    imgWrap.classList.add("hidden");
    imgEl.src = "";
  }

  optsEl.innerHTML = "";
  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.textContent = opt;
    btn.className = "option-btn bg-white p-3 rounded-xl border border-gray-200 hover:bg-blue-100 animate__animated animate__fadeInUp";
    btn.addEventListener("click", () => handleAnswer(btn, opt, q.correctText));
    optsEl.appendChild(btn);
  });

  startTimer();
}

/* ====== TIMER ====== */
function startTimer() {
  let t = 30;
  timeLeftEl.textContent = t;
  timer = setInterval(() => {
    t--;
    timeLeftEl.textContent = t;
    if (t <= 0) {
      clearInterval(timer);
      goNext();
    }
  }, 1000);
}

/* ====== HANDLE ANSWER ====== */
function handleAnswer(button, selectedText, correctTextRaw) {
  clearInterval(timer);
  optsEl.querySelectorAll("button").forEach(b => b.disabled = true);

  const selected = normalize(selectedText);
  const correct  = normalize(correctTextRaw);

  if (selected === correct) {
    score++;
    liveScoreEl.textContent = score;
    button.classList.add("bg-green-200", "border-green-400");
  } else {
    button.classList.add("bg-red-200", "border-red-400");
    optsEl.querySelectorAll("button").forEach(b => {
      if (normalize(b.textContent) === correct) {
        b.classList.add("bg-green-200", "border-green-400");
      }
    });
  }
  setTimeout(goNext, 900);
}

/* ====== NEXT / RESULTS ====== */
function goNext() {
  currentQuestionIndex++;
  if (currentQuestionIndex < questions.length) {
    showQuestion();
  } else {
    showResults();
  }
}

function showResults() {
  quizContainer.classList.add("hidden");
  resultsScreen.classList.remove("hidden");
  finalScoreEl.textContent = score;
  totalScoreEl.textContent = questions.length;
  const percent = (score / questions.length) * 100;
  percentageEl.textContent = percent.toFixed(2);

  const titleEl = document.getElementById("result-title");
  if (score >= 15) {
    titleEl.textContent = "🎉 Congratulations! You Passed!";
    titleEl.className = "text-3xl font-bold mb-4 text-green-600 animate__animated animate__bounceIn";
  } else {
    titleEl.textContent = "❌ Sorry, You Failed!";
    titleEl.className = "text-3xl font-bold mb-4 text-red-600 animate__animated animate__shakeX";
  }
}

/* ====== RESTART QUIZ ====== */
document.getElementById("restart-btn").addEventListener("click", () => {
  resultsScreen.classList.add("hidden");
  welcomeScreen.classList.remove("hidden");
  score = 0;
  currentQuestionIndex = 0;
});
</script>
</body>
</html>
